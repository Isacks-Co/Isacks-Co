name: CI

on:
  pull_request:
    branches: [ "dev" , "main" ]

permissions:
  contents: read

jobs:
  ci-test:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.12
      uses: actions/setup-python@v3
      with:
        python-version: "3.12"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install cython ase numpy==1.26.4 scipy matplotlib mpi4py ipython \
        sphinx sphinx_rtd_theme mpmath asap3 pytest pandas mace-torch

    - name: CI-tests
      run: |
        cd Tests
        # pytest TestMolecularDynamics.py --junit-xml=ReportMolecularDynamics.xml --color=yes
        pytest -k "not TestMolecularDynamics" --junit-xml=ReportOther.xml --color=yes
        cd ..

  upload-reports:
    runs-on: ubuntu-latest
    needs: ci-test
    steps:
    - uses: actions/checkout@v4

    - name: Upload-results
      uses: dorny/test-reporter@v2
      if: ${{ !cancelled() }}
      with:
        name: Pytest results
        path: Tests/Test*.xml
        reporter: jest-junit
