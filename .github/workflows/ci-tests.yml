name: CI

on:
  pull_request:

permissions:
  contents: read
  issues: read
  checks: write
  pull-requests: write

jobs:
  ci-test:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.12
      uses: actions/setup-python@v3
      with:
        python-version: "3.12"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install cython ase numpy==1.26.4 scipy matplotlib mpi4py ipython \
        sphinx sphinx_rtd_theme mpmath asap3 pytest pandas mace-torch

    - name: CI-tests
      run: |
        cd Tests
        # pytest TestMolecularDynamics.py --junit-xml=ReportMolecularDynamics.xml --color=yes
        pytest -k "not TestMolecularDynamics" --junit-xml=ReportOther.xml --color=yes
        cd ..

    - name: Upload-results
      uses: EnricoMi/publish-unit-test-result-action@v2
      if: (!cancelled())
      with:
        files: Tests/Report*.xml
